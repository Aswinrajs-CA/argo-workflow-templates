apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: notification
  namespace: argo
  labels:
    app: argo-templates
    category: notification
spec:
  templates:
    - name: slack-notify
      inputs:
        parameters:
          - name: webhook-url
          - name: message
          - name: channel
            default: "#general"
      script:
        image: curlimages/curl:latest
        command: [sh]
        source: |
          curl -X POST \
            -H 'Content-type: application/json' \
            --data '{"channel":"{{inputs.parameters.channel}}","text":"{{inputs.parameters.message}}"}' \
            {{inputs.parameters.webhook-url}}

    - name: log-result
      inputs:
        parameters:
          - name: status
          - name: workflow-name
          - name: details
            default: ""
      script:
        image: alpine:3.18
        command: [sh]
        source: |
          echo "================================"
          echo "Workflow: {{inputs.parameters.workflow-name}}"
          echo "Status:   {{inputs.parameters.status}}"
          echo "Time:     $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Details:  {{inputs.parameters.details}}"
          echo "================================"
